<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="memo-init">
  <title>memo-init</title>
  <!-- square variant: memo-card glyph only (no wordmark), explicit colors
       (Memo 003 F2 = A) — source for org avatar + favicons. Thicker stroke
       (3.5 vs 2.2 in the wordmark) keeps the glyph readable at 16 px. -->
  <rect width="64" height="64" rx="12" fill="#0d1117" />
  <g stroke="#5ee0d6" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- memo card with folded top-right corner, centered, scaled up -->
    <path d="M17 12 h23 l10 10 v28 a3 3 0 0 1 -3 3 H17 a3 3 0 0 1 -3 -3 V15 a3 3 0 0 1 3 -3 Z" />
    <path d="M40 12 v10 h10" />
    <path d="M22 32 h20" />
    <path d="M22 42 h14" />
  </g>
</svg>
